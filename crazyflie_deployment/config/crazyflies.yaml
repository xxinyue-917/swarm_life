# Crazyswarm2-format drone config
# Used by ros2 launch crazyflie launch.py via crazyflies_yaml_file argument
#
# Two Crazyradio PAs: radio 0 (cf1-cf5), radio 1 (cf6-cf10)
# All drones start disabled — enable each one only after its Vicon rigid body
# (matching name) is created and tracked.

fileversion: 3

robots:
  cf1:
    enabled: false
    uri: radio://0/80/2M/E7E7E7E701
    initial_position: [-1.0, -1.0, 0.0]
    type: cf21
  cf2:
    enabled: false
    uri: radio://0/80/2M/E7E7E7E702
    initial_position: [-1.0, -0.5, 0.0]
    type: cf21
  cf3:
    enabled: false
    uri: radio://0/80/2M/E7E7E7E703
    initial_position: [-1.0,  0.0, 0.0]
    type: cf21
  cf4:
    enabled: false
    uri: radio://0/80/2M/E7E7E7E704
    initial_position: [-1.0,  0.5, 0.0]
    type: cf21
  cf5:
    enabled: false
    uri: radio://0/80/2M/E7E7E7E705
    initial_position: [-1.0,  1.0, 0.0]
    type: cf21
  cf6:
    enabled: false
    uri: radio://1/90/2M/E7E7E7E706
    initial_position: [ 1.0, -1.0, 0.0]
    type: cf21
  cf7:
    enabled: false
    uri: radio://1/90/2M/E7E7E7E707
    initial_position: [ 1.0, -0.5, 0.0]
    type: cf21
  cf8:
    enabled: false
    uri: radio://1/90/2M/E7E7E7E708
    initial_position: [ 1.0,  0.0, 0.0]
    type: cf21
  cf9:
    enabled: false
    uri: radio://1/90/2M/E7E7E7E709
    initial_position: [ 1.0,  0.5, 0.0]
    type: cf21
  cf10:
    enabled: false
    uri: radio://1/90/2M/E7E7E7E70A
    initial_position: [ 1.0,  1.0, 0.0]
    type: cf21

robot_types:
  cf21:
    motion_capture:
      tracking: "librigidbodytracker"
      marker: "default"
      dynamics: "default"
    big_quad: false
    battery:
      voltage_warning: 3.8
      voltage_critical: 3.7

# Optional firmware params loaded for all drones (extend as needed)
all:
  firmware_params:
    commander:
      enHighLevel: 1
    stabilizer:
      estimator: 2          # 2 = Kalman (required for external positioning)
      controller: 2         # 2 = Mellinger; switch to 1 (PID) for velocity-mode
    locSrv:
      extPosStdDev: 1.0e-3
      extQuatStdDev: 0.5e-1
    kalman:
      resetEstimation: 1
