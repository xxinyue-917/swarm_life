# Crazyswarm2-format drone config
# Used by ros2 launch crazyflie launch.py via crazyflies_yaml_file argument
#
# Fleet (as of 2026-05-14):
#   cf1, cf2, cf3, cf4, cf5, cf6, cf7, cf8, cf9 — all 9 drones flight-worthy
#   cf3, cf8, cf9 are NEW drones (2026-05-14) replacing the old cf3/cf8/cf9 slots:
#     - old cf3: was off / dead battery
#     - cf8: no entry existed before (gap in original numbering)
#     - old cf9: could not balance after 2026-05-14 prop reinstall, retired
#   Old cf1/cf2/cf4/cf5/cf6/cf7 still in use — all per-drone hover-tested 2026-05-14.
#
# Dongle assignment (cflib URIs are 0-indexed): cf1-3 → dongle 0, cf4-6 → dongle 1,
# cf7-9 → dongle 2. Plug the 3 Crazyradios in the order you want them numbered —
# USB enumeration sets the index.

fileversion: 3

robots:
  # Standalone mocap-volume probe (added 2026-05-12). Disabled when the real
  # fleet is flying to avoid factory-channel interference with fleet radios.
  cfx:
    enabled: false
    uri: radio://0/80/2M/E7E7E7E7E7
    initial_position: [-1.0, 1.0, 0.0]
    type: cf21
  cf1:
    enabled: true
    uri: radio://0/1/2M/E7E7E7E701
    initial_position: [1.0, 1.0, 0.0]
    type: cf21
  cf2:
    enabled: true
    uri: radio://0/1/2M/E7E7E7E702
    initial_position: [1.0, 0.0, 0.0]
    type: cf21
  cf3:
    enabled: false   # NEW drone (2026-05-14), flashed to E7E7E7E703/ch1; off for first 6-drone test
    uri: radio://0/1/2M/E7E7E7E703
    initial_position: [1.0, -1.0, 0.0]
    type: cf21
  cf4:
    enabled: true
    uri: radio://1/1/2M/E7E7E7E704
    initial_position: [0.0, 1.0, 0.0]
    type: cf21
  cf5:
    enabled: true
    uri: radio://1/5/2M/E7E7E7E705
    initial_position: [0.0, 0.0, 0.0]
    type: cf21
  cf6:
    enabled: true
    uri: radio://1/5/2M/E7E7E7E706
    initial_position: [-1.0, 0.0, 0.0]
    type: cf21
  cf7:
    enabled: true
    uri: radio://2/5/2M/E7E7E7E707
    initial_position: [-1.0, 1.0, 0.0]
    type: cf21
  cf8:
    enabled: false   # NEW drone (2026-05-14), not yet flashed — off until cfclient burn
    uri: radio://2/5/2M/E7E7E7E708
    initial_position: [-1.0, -1.0, 0.0]
    type: cf21
  cf9:
    enabled: false   # NEW drone (2026-05-14), not yet flashed — off until cfclient burn
    uri: radio://2/6/2M/E7E7E7E709
    initial_position: [0.0, -1.0, 0.0]
    type: cf21

robot_types:
  cf21:
    motion_capture:
      # Single-marker mode: librigidbodytracker matches a single reflective
      # marker on top of the drone against the "default_single_marker"
      # configuration in motion_capture.yaml. Position-only (no yaw observability)
      # — fine for hover, OK for translation, not for tasks needing yaw control.
      # When switching back to 4 markers, set:
      #   tracking: "vendor"  (or "librigidbodytracker")
      #   marker:   "default"
      tracking: librigidbodytracker
      marker: default_single_marker
      dynamics: default
    big_quad: false
    battery:
      voltage_warning: 3.8
      voltage_critical: 3.7

# Optional firmware params loaded for all drones (extend as needed)
all:
  firmware_params:
    commander:
      enHighLevel: 1
    stabilizer:
      estimator: 2          # 2 = Kalman (required for external positioning)
      controller: 1         # 1 = PID (forgiving, recommended for first flight); 2 = Mellinger
    locSrv:
      extPosStdDev: 1.0e-3
      extQuatStdDev: 0.5e-1
    kalman:
      resetEstimation: 1
  firmware_logging:
    enabled: true
    default_topics:
      # Publishes /cfN/pose at the given Hz, sourced from the firmware's own
      # state estimate (stateEstimate.x/y/z/q*). Useful for verifying the
      # Kalman estimator has converged before takeoff.
      pose:
        frequency: 10
