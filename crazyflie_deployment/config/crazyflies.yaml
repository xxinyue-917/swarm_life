# Crazyswarm2-format drone config
# Used by ros2 launch crazyflie launch.py via crazyflies_yaml_file argument
#
# Channel reassignment 2026-05-18: every drone gets a unique channel in
# the 81-89 range (CF ch80+ = 2480+ MHz, above all 2.4 GHz WiFi). Naming
# convention: cfN → channel 80+N. Address still E7E7E7E70N. This kills the
# inherited cross-dongle channel collisions (cf4/cf1-3 on ch1, cf7/cf5-6 on ch5)
# AND moves the whole fleet out of WiFi territory. Was: ch1/ch5/ch6, which sit
# inside WiFi ch1 (2401-2423 MHz) — works but vulnerable to anyone's router.
#
# Dongle assignment (cflib URIs are 0-indexed): cf1-3 → dongle 0, cf4-6 → dongle 1,
# cf7-9 → dongle 2. Plug the 3 Crazyradios in the order you want them numbered —
# USB enumeration sets the index.
#
# Each drone must be reflashed via cfclient before it will respond at the new URI.
# Per drone: Connect at current URI → Configure 2.x → set Radio channel to the
# value in the table → Write → drone reboots on new channel. enabled stays false
# until the reflash is verified.

fileversion: 3

robots:
  # Standalone mocap-volume probe. Kept on factory ch80 (cfx is below the fleet's
  # 81-89 range so it never collides). Disabled when the real fleet is flying.
  cfx:
    enabled: false
    uri: radio://0/80/2M/E7E7E7E7E7
    initial_position: [-1.0, 1.0, 0.0]
    type: cf21
  # initial_position MUST match the physical drone-to-URI placement, otherwise
  # librigidbodytracker assigns each Vicon rigid body to the marker of a
  # DIFFERENT physical drone — extPos then goes to the wrong firmware and the
  # fleet flies into walls on takeoff. This caused the 2026-05-18 cf6/cf8/cf9
  # crashes: cf6/cf8/cf9 were cyclically swapped vs the YAML below.
  cf1:
    enabled: true    # reflashed to ch81 (2026-05-18)
    uri: radio://0/81/2M/E7E7E7E701
    initial_position: [1.0, 1.0, 0.0]
    type: cf21
  cf2:
    enabled: true    # reflashed to ch82 (2026-05-18)
    uri: radio://0/82/2M/E7E7E7E702
    initial_position: [1.0, 0.0, 0.0]
    type: cf21
  cf3:
    enabled: true    # NEW drone (2026-05-14), reflashed to ch83 (2026-05-18)
    uri: radio://0/83/2M/E7E7E7E703
    initial_position: [1.0, -1.0, 0.0]
    type: cf21
  cf4:
    enabled: true    # reflashed to ch84 (2026-05-18)
    uri: radio://1/84/2M/E7E7E7E704
    initial_position: [0.0, 1.0, 0.0]
    type: cf21
  cf5:
    enabled: true    # reflashed to ch85 (2026-05-18)
    uri: radio://1/85/2M/E7E7E7E705
    initial_position: [0.0, 0.0, 0.0]
    type: cf21
  cf6:
    enabled: true    # 2026-05-18: physical position corrected from (-1,0) to (0,-1) to match actual drone placement
    uri: radio://1/86/2M/E7E7E7E706
    initial_position: [0.0, -1.0, 0.0]
    type: cf21
  cf7:
    enabled: true    # reflashed to ch87 (2026-05-18)
    uri: radio://2/87/2M/E7E7E7E707
    initial_position: [-1.0, 1.0, 0.0]
    type: cf21
  cf8:
    enabled: true    # 2026-05-18: physical position corrected from (-1,-1) to (-1,0) to match actual drone placement
    uri: radio://2/88/2M/E7E7E7E708
    initial_position: [-1.0, 0.0, 0.0]
    type: cf21
  cf9:
    enabled: true    # 2026-05-18: physical position corrected from (0,-1) to (-1,-1) to match actual drone placement
    uri: radio://2/89/2M/E7E7E7E709
    initial_position: [-1.0, -1.0, 0.0]
    type: cf21

robot_types:
  cf21:
    motion_capture:
      # Single-marker mode: librigidbodytracker matches a single reflective
      # marker on top of the drone against the "default_single_marker"
      # configuration in motion_capture.yaml. Position-only (no yaw observability)
      # — fine for hover, OK for translation, not for tasks needing yaw control.
      # When switching back to 4 markers, set:
      #   tracking: "vendor"  (or "librigidbodytracker")
      #   marker:   "default"
      tracking: librigidbodytracker
      marker: default_single_marker
      dynamics: default
    big_quad: false
    battery:
      voltage_warning: 3.8
      voltage_critical: 3.7

# Optional firmware params loaded for all drones (extend as needed)
all:
  firmware_params:
    commander:
      enHighLevel: 1
    stabilizer:
      estimator: 2          # 2 = Kalman (required for external positioning)
      controller: 1         # 1 = PID (forgiving, recommended for first flight); 2 = Mellinger
    locSrv:
      extPosStdDev: 1.0e-3
      extQuatStdDev: 0.5e-1
    kalman:
      resetEstimation: 1
  firmware_logging:
    enabled: true
    default_topics:
      # Publishes /cfN/pose at the given Hz, sourced from the firmware's own
      # state estimate (stateEstimate.x/y/z/q*). Useful for verifying the
      # Kalman estimator has converged before takeoff.
      pose:
        frequency: 10
