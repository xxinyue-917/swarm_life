# Crazyswarm2-format drone config
# Used by ros2 launch crazyflie launch.py via crazyflies_yaml_file argument
#
# Fleet inherited from previous Crazyswarm1 deployment:
#   cf1-cf4 on channel 1, cf5+cf7 on channel 5, cf9 on channel 6
#   No cf6, cf8, cf10 (gap in original numbering)
#
# All drones start enabled = false. Enable each drone only after:
#   (1) battery charged and drone responds to radio scan
#   (2) Vicon rigid body matching the name exists and is tracked

fileversion: 3

robots:
  # New Crazyflie (added 2026-05-12), kept under a separate name to avoid
  # confusion with the older cf1-cf9 fleet. Factory-default address until
  # reconfigured — verify with `cfclient` Scan and update if it differs.
  cfx:
    enabled: true
    uri: radio://0/80/2M/E7E7E7E7E7
    initial_position: [0.0, 0.0, 0.0]
    type: cf21
  cf1:
    enabled: false   # alive (last scan 2026-05-01); flips on takeoff (2026-05-04)
    uri: radio://0/1/2M/E7E7E7E701
    initial_position: [0.0, 0.0, 0.0]
    type: cf21
  cf2:
    enabled: false   # off / dead battery
    uri: radio://0/1/2M/E7E7E7E702
    initial_position: [1.0, 0.0, 0.0]
    type: cf21
  cf3:
    enabled: false   # off / dead battery
    uri: radio://0/1/2M/E7E7E7E703
    initial_position: [1.0, -1.0, 0.0]
    type: cf21
  cf4:
    enabled: false   # off / dead battery
    uri: radio://0/1/2M/E7E7E7E704
    initial_position: [0.0, 1.0, 0.0]
    type: cf21
  cf5:
    enabled: false   # alive (last scan 2026-05-01)
    uri: radio://0/5/2M/E7E7E7E705
    initial_position: [0.0, 0.0, 0.0]
    type: cf21
  cf7:
    enabled: false   # alive (last scan 2026-05-01)
    uri: radio://0/5/2M/E7E7E7E707
    initial_position: [-1.0, 1.0, 0.0]
    type: cf21
  cf9:
    enabled: false   # off / dead battery
    uri: radio://0/6/2M/E7E7E7E709
    initial_position: [0.0, -1.0, 0.0]
    type: cf21

robot_types:
  cf21:
    motion_capture:
      # Single-marker mode: librigidbodytracker matches a single reflective
      # marker on top of the drone against the "default_single_marker"
      # configuration in motion_capture.yaml. Position-only (no yaw observability)
      # — fine for hover, OK for translation, not for tasks needing yaw control.
      # When switching back to 4 markers, set:
      #   tracking: "vendor"  (or "librigidbodytracker")
      #   marker:   "default"
      tracking: "librigidbodytracker"
      marker: "default_single_marker"
      dynamics: "default"
    big_quad: false
    battery:
      voltage_warning: 3.8
      voltage_critical: 3.7

# Optional firmware params loaded for all drones (extend as needed)
all:
  firmware_params:
    commander:
      enHighLevel: 1
    stabilizer:
      estimator: 2          # 2 = Kalman (required for external positioning)
      controller: 1         # 1 = PID (forgiving, recommended for first flight); 2 = Mellinger
    locSrv:
      extPosStdDev: 1.0e-3
      extQuatStdDev: 0.5e-1
    kalman:
      resetEstimation: 1
  firmware_logging:
    enabled: true
    default_topics:
      # Publishes /cfN/pose at the given Hz, sourced from the firmware's own
      # state estimate (stateEstimate.x/y/z/q*). Useful for verifying the
      # Kalman estimator has converged before takeoff.
      pose:
        frequency: 10
