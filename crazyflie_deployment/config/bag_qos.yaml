# QoS overrides for `ros2 bag record` so it can actually subscribe to the
# best-effort topics in this stack. Without these, bag records nothing from
# /poses (motion_capture_tracking publishes best-effort because mocap is
# sensor data) and nothing from the per-drone firmware pose topics.
/poses:
  reliability: best_effort
  history: keep_last
  depth: 100
/pointCloud:
  reliability: best_effort
  history: keep_last
  depth: 100
/cfx/pose:
  reliability: best_effort
  history: keep_last
  depth: 100
